<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Learning Slides | CAP-Vision Institute</title>
    <style>
        @font-face {
            font-family: 'TBold';
            src: url('./TBold.ttf') format('truetype');
            font-weight: bold;
        }
        @font-face {
            font-family: 'TMedium';
            src: url('./TMedium.ttf') format('truetype');
        }

        :root {
            --ink: #0e1b24;
            --ink-soft: #5d7283;
            --teal: #15A89B;
            --blue: #2FA3DE;
            --gold: #FFC53D;
            --coral: #FF6F61;
            --cream: #FFFDF6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'TMedium', sans-serif;
            background: #fff;
            color: var(--ink);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-pattern {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--ink) 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            opacity: 0.05;
            z-index: -1;
        }

        .container {
            max-width: 1000px;
            padding: 60px 20px;
            width: 100%;
            box-sizing: border-box;
        }

        header {
            margin-bottom: 60px;
            text-align: center;
        }

        .logo-box {
            display: inline-block;
            background: var(--ink);
            color: #fff;
            padding: 10px 25px;
            font-family: 'TBold';
            font-size: 1.2rem;
            letter-spacing: 3px;
            border-radius: 4px;
            margin-bottom: 25px;
        }

        h1 {
            font-family: 'TBold', sans-serif;
            font-size: 4rem;
            margin: 0;
            line-height: 1;
            color: var(--ink);
        }

        p.subtitle {
            font-size: 1.4rem;
            color: var(--ink-soft);
            margin-top: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            h1 { font-size: 3rem; }
        }

        .card {
            background: #fff;
            padding: 50px 40px;
            border-radius: 32px;
            text-decoration: none;
            color: inherit;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
            border: 1px solid #eee;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--ink);
            box-shadow: 0 30px 60px rgba(14, 27, 36, 0.1);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 150px; height: 150px;
            background: radial-gradient(circle at center, var(--color), transparent 70%);
            opacity: 0.05;
            transform: translate(30%, -30%);
        }

        .card.growing { --color: var(--teal); }
        .card.signal { --color: var(--blue); }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-svg {
            width: 100%;
            height: 100%;
            stroke-width: 1.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        h2 {
            font-family: 'TBold', sans-serif;
            font-size: 2.2rem;
            margin: 0;
            line-height: 1.2;
        }

        .desc {
            font-size: 1.1rem;
            color: var(--ink-soft);
            margin-top: 10px;
        }

        .action-btn {
            margin-top: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'TBold';
            color: var(--color);
            font-size: 1.1rem;
        }

        .action-btn svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        .card:hover .action-btn svg {
            transform: translateX(5px);
        }

        footer {
            margin-top: 80px;
            padding: 40px;
            border-top: 1px solid #eee;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            color: var(--ink-soft);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <div class="container">
        <header>
            <div class="logo-box">CAP-VISION</div>
            <h1>E-Learning Portal</h1>
            <p class="subtitle">Interactive Slide Decks for Modern Education</p>
        </header>

        <div class="grid">
            <!-- Course 1 -->
            <a href="./Growing Up - The Game of Life.dc.html" class="card growing">
                <div class="icon-wrapper">
                    <svg class="icon-svg" viewBox="0 0 24 24" stroke="var(--teal)">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                        <circle cx="12" cy="7" r="1.5" fill="var(--teal)" stroke="none"/>
                    </svg>
                </div>
                <h2>GROWING UP</h2>
                <div class="desc">The Game of Life · Chapter 1-3</div>
                <div class="action-btn">
                    เข้าสู่บทเรียน 
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
            </a>

            <!-- Course 2 -->
            <a href="./Communication Skill - THE SIGNAL.dc.html" class="card signal">
                <div class="icon-wrapper">
                    <svg class="icon-svg" viewBox="0 0 24 24" stroke="var(--blue)">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        <path d="M12 8v4l3 2"/>
                        <circle cx="12" cy="12" r="7" opacity="0.2"/>
                    </svg>
                </div>
                <h2>THE SIGNAL</h2>
                <div class="desc">Communication Skill · Module 1-3</div>
                <div class="action-btn">
                    เข้าสู่บทเรียน 
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
            </a>
        </div>

        <footer>
            &copy; 2026 CAP-VISION INSTITUTE. ALL RIGHTS RESERVED.
        </footer>
    </div>
</body>
</html>
